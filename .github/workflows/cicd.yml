name: Ghostmap CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ghostmap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @ghostmap/core build

      - name: Build ui
        run: pnpm --filter @ghostmap/ui build

      - name: Build worker
        run: pnpm --filter @ghostmap/worker build

      - name: Test core
        run: pnpm --filter @ghostmap/core test

      - name: Type-check web
        run: pnpm --filter @ghostmap/web type-check

      - name: Type-check worker
        run: pnpm --filter @ghostmap/worker type-check

  deploy_web:
    name: Deploy Web (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.4.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @ghostmap/core build

      - name: Build ui
        run: pnpm --filter @ghostmap/ui build

      - name: Build web for Cloudflare
        run: pnpm --filter @ghostmap/web build:cf
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Deploy Pages artifact
        run: pnpm --filter @ghostmap/web exec wrangler pages deploy .vercel/output/static --project-name ghostmap --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy_worker:
    name: Deploy Worker Service (Render)
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "${RENDER_API_KEY}" ]; then
            echo "Missing required secret: RENDER_API_KEY"
            exit 1
          fi

          if [ -z "${RENDER_SERVICE_ID}" ]; then
            echo "Missing required secret: RENDER_SERVICE_ID"
            exit 1
          fi

          curl --fail --show-error --silent \
            -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}'

          echo "Render deploy API triggered."
